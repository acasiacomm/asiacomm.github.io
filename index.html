// --- Render Posts with Lazy Loading ---
const postGrid=document.getElementById("postGrid");
const searchInput=document.createElement("input");
searchInput.placeholder="搜尋貼文...";
document.getElementById("postContainer").prepend(searchInput);

function renderPosts(){
  const keyword=searchInput.value.toLowerCase();
  const filtered=articles.filter(a=>a.title.toLowerCase().includes(keyword) || a.summary.toLowerCase().includes(keyword) || a.tags.some(t=>t.toLowerCase().includes(keyword)));
  postGrid.innerHTML=filtered.map(a=>`
    <div class="post-card" onclick="openPost(${a.id})">
      <img data-src="${a.images[0]}" loading="lazy" />
      <h3>${a.title}</h3>
      <p>${a.summary}</p>
      <div class="tags">${a.tags.map(t=>`<span>${t}</span>`).join('')}</div>
    </div>`).join("");

  // IntersectionObserver 懶加載
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const img = entry.target;
        img.src = img.dataset.src;
        observer.unobserve(img);
      }
    });
  });
  document.querySelectorAll('.post-card img').forEach(img=>observer.observe(img));
}

searchInput.addEventListener("input",renderPosts);
renderPosts();

// --- Post Modal ---
const postModal=document.getElementById("postModal");
function openPost(id){
  const post=articles.find(a=>a.id===id);
  document.getElementById("modalTitle").innerText=post.title;
  document.getElementById("modalContent").innerText=post.content;
  const slider=document.getElementById("modalSlider");
  slider.innerHTML=post.images.map((img,i)=>`<img src="${img}" style="display:${i===0?'block':'none'}">`).join("");
  let idx=0;
  slider.onclick=()=>{
    const imgs=slider.querySelectorAll("img");
    imgs[idx].style.display="none";
    idx=(idx+1)%imgs.length;
    imgs[idx].style.display="block";
  };
  postModal.style.display="block";
}
function closePost(){postModal.style.display="none";}

// --- Dark Mode ---
const darkBtn=document.getElementById("darkModeBtn");
darkBtn.onclick=()=>{
  const on=!document.body.classList.contains("dark");
  document.body.classList.toggle("dark",on);
  localStorage.setItem("darkMode",on?"1":"0");
};
if(localStorage.getItem("darkMode")==="1") document.body.classList.add("dark");

// --- Video Player ---
let player, currentIndex=0;
function onYouTubeIframeAPIReady(){
  player=new YT.Player('youtubePlayer',{
    videoId:'c2ctgbsYoWE', // 初始影片 ID
    playerVars:{
      'autoplay': 0,    // 1. 設定為 0，開啟網頁不自動播放
      'mute': 0,        // 2. 既然不自動播放，就不需要強制靜音
      'rel': 0,
      'modestbranding': 1
    },
    events:{
      'onReady': setupVideoMenu,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  if(event.data === YT.PlayerState.ENDED) {
    playNext();
  }
}

function setupVideoMenu(){
  const videos=document.querySelectorAll(".video-item");
  videos.forEach((item,index)=> {
    item.addEventListener("click",() => {
      playVideo(index);
    });
  });
}

function playVideo(index){
  const videos=document.querySelectorAll(".video-item");
  currentIndex=index;
  const videoId = videos[index].dataset.id;
  
  // 切換影片並立即播放 (手動點選時播放)
  player.loadVideoById(videoId);
  
  // 更新 UI 狀態
  videos.forEach(v=>v.classList.remove("active"));
  videos[index].classList.add("active");
}

function playNext(){
  const videos=document.querySelectorAll(".video-item");
  let next=currentIndex+1;
  if(next>=videos.length) next=0;
  playVideo(next);
}

// --- Load YouTube API ---
const tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
