<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊就好 - 現代化版面</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --accent-color: #f59e0b; 
            --bg-color: #f5f6fa;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body.dark {
            --bg-color: #111;
            --text-color: #eee;
            --card-bg: #222;
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        /* Header 特效 */
        header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        header h1, header p { position: relative; z-index: 1; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* 三欄佈局 */
        .main-container {
            max-width: 1400px; 
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 1.5rem;
            padding: 0 1.5rem;
        }

        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
        }

        /* 通用卡片設計 */
        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }

        /* 左側：影片選單 */
        .video-menu { max-height: 600px; overflow-y: auto; }
        .video-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.2s;
            border-left: 4px solid transparent;
        }
        .video-item:hover { background: rgba(37, 117, 252, 0.1); }
        .video-item.active {
            background: var(--secondary-color);
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* 中間：影片播放器與貼文 */
        .video-player-section { margin-bottom: 2rem; }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .video-wrapper iframe { position: absolute; width: 100%; height: 100%; border: none; }

        /* 貼文區域 */
        .section-title {
            border-left: 5px solid var(--secondary-color);
            padding-left: 1rem;
            margin: 1.5rem 0;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            background: var(--card-bg);
            color: var(--text-color);
        }
        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .post-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .post-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .post-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .post-info { padding: 15px; }
        .tags span {
            background: rgba(37, 117, 252, 0.1);
            color: var(--secondary-color);
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
            margin-right: 5px;
        }

        /* 右側：關於我與統計 */
        .dev-card { text-align: center; }
        .skill-tag {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
        }

        /* 彈窗 */
        #postModal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); z-index:10000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); max-width: 800px; margin: 50px auto;
            padding: 30px; border-radius: 20px; position: relative;
        }
        .closeBtn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 24px; }

        #darkModeBtn {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px; border: none; border-radius: 50%;
            background: var(--secondary-color); color: white;
            cursor: pointer; z-index: 10001; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        footer { text-align: center; padding: 40px; color: #888; border-top: 1px solid rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <div id="canvas-container"></div>
    <h1>旅遊就好</h1>
    <p>✨ 不完美的旅途也值得 | 放下一切比較，擁抱當下</p>
</header>

<button id="darkModeBtn">🌓</button>

<div class="main-container">
    <div class="left-column">
        <div class="glass-card">
            <h3 style="margin-top:0">🎬 影片巡禮</h3>
            <div class="video-menu" id="videoMenu">
                <div class="video-item active" data-id="c2ctgbsYoWE">🎄 2023新北耶誕城</div>
                <div class="video-item" data-id="DauE0ZAVfLo">🌌 關渡橋與關渡濕地</div>
                <div class="video-item" data-id="CgM8GbcfQA0">🌊 2023坪溪</div>
                <div class="video-item" data-id="kuXlTM_xFos">🏙️ 金山海岸</div>
                <div class="video-item" data-id="DXKRYOX5eEw">🌄 石門-風箏公園</div>
                <div class="video-item" data-id="b5yp3OzCKXc">✨ 海洋生物</div>
                <div class="video-item" data-id="u-XgX6U4Ec0">🎠 社子島</div>
                <div class="video-item" data-id="1eklV-oBPYg">🏞️ 霧台</div>
                <div class="video-item" data-id="ItaSIOD90lE">🚆 自由廣場</div>
                <div class="video-item" data-id="k49D0Iu4vSU">🏖️ 貴子坑</div>
            </div>
        </div>
    </div>

    <div class="middle-column">
        <div class="video-player-section">
            <div class="video-wrapper">
                <div id="youtubePlayer"></div>
            </div>
        </div>

        <h2 class="section-title">最新旅誌</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋回憶與文字...">
        <div id="postGrid" class="post-grid"></div>
    </div>

    <div class="right-column">
        <div class="glass-card dev-card">
            <h3>關於版主</h3>
            <p style="font-size: 0.9rem; color: #666;">帶上相機，我們出發吧。在這裡分享我眼中的世界。</p>
            <div style="margin-top:15px">
                <span class="skill-tag">攝影</span>
                <span class="skill-tag">慢活</span>
                <span class="skill-tag">古籍研究</span>
                <span class="skill-tag">空拍</span>
            </div>
        </div>
        <div class="glass-card">
            <h3>站內公告</h3>
            <p style="font-size: 0.85rem; line-height: 1.6;">本站紀錄了 2023-2025 年間的旅行足跡，文字與影像皆為原創感悟。</p>
        </div>
    </div>
</div>

<div id="postModal">
    <div class="modal-content">
        <span class="closeBtn" onclick="closePost()">✕</span>
        <div id="modalSlider"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalContent" style="white-space: pre-line; line-height: 1.8;"></p>
    </div>
</div>

<footer>© 2025 旅遊就好. 版面整合自 Benny Studio.</footer>

<script>
// --- 原網站 Articles Data (完全保留) ---
const articles=[
  {id:1,title:"《大清聖祖仁皇帝實錄》",summary:"這是一部清朝官修的紀傳體史書...",content:`康熙三十六年（1697年）四月初九日...內容涉及軍事報告、邊防事務等。`,tags:["海","城市"],images:["100.jpg"]},
  {id:2,title:"奏報準葛爾丹生亡丹濟拉來降",summary:"這份奏報內容指的是清朝康熙年間平定準噶爾...",content: `噶爾丹之死: 康熙帝曾三次親征噶爾丹...`,tags:["山","海"],images:["200.jpg"]},
  {id:3,title:"《春秋繁露》古籍",summary:"介紹古籍《春秋繁露》的背景與內容。",content:`這是一本名為《春秋繁露》的古籍...`,tags:["海","城市"],images:["IMG_20251207_100736.jpg"]},
  {id:5,title:"《周官講義》",summary:"周朝官制與婦女教育規範",content:`此書深入探討周禮中的女性角色與職責...`,tags:["城市"],images:["IMG_20251207_100410.jpg"]},
  {id:11,title:"《紅樓夢》第五回",summary:"以詩詞形式總結了賈府乃至世間眾人的命運。",content:`為官的家業凋零，富貴的金銀散盡，世事無常...`,tags:["山","城市"],images:["IMG_20251207_112007.jpg"]},
  {id:15,title:"蘇軾《赤壁賦》",summary:"內容描繪了蘇軾與友人在黃州赤壁夜遊泛舟。 ",content:`作品為北宋文學家蘇軾所作...`,tags:["城市","歷史"],images:["IMG_20251207_113405.jpg"]}
];

// --- 渲染貼文 ---
const postGrid=document.getElementById("postGrid");
const searchInput=document.getElementById("searchInput");

function renderPosts(){
    const keyword=searchInput.value.toLowerCase();
    const filtered=articles.filter(a=>a.title.toLowerCase().includes(keyword) || a.summary.toLowerCase().includes(keyword));
    postGrid.innerHTML=filtered.map(a=>`
        <div class="post-card" onclick="openPost(${a.id})">
            <img src="${a.images[0]}" loading="lazy" />
            <div class="post-info">
                <h3>${a.title}</h3>
                <p style="font-size:0.85rem; color:#666">${a.summary}</p>
                <div class="tags">${a.tags.map(t=>`<span>${t}</span>`).join('')}</div>
            </div>
        </div>`).join("");
}

searchInput.addEventListener("input",renderPosts);
renderPosts();

// --- Modal 控制 ---
function openPost(id){
    const post=articles.find(a=>a.id===id);
    document.getElementById("modalTitle").innerText=post.title;
    document.getElementById("modalContent").innerText=post.content;
    document.getElementById("postModal").style.display="block";
}
function closePost(){document.getElementById("postModal").style.display="none";}

// --- 深色模式 (保留) ---
const darkBtn=document.getElementById("darkModeBtn");
darkBtn.onclick=()=>{
    document.body.classList.toggle("dark");
    localStorage.setItem("travelDarkMode", document.body.classList.contains("dark") ? "1" : "0");
};
if(localStorage.getItem("travelDarkMode")==="1") document.body.classList.add("dark");

// --- Three.js 背景特效 (來自第二個網站) ---
function initHeaderArt() {
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const particlesCount = 1000;
    const posArray = new Float32Array(particlesCount * 3);
    for(let i = 0; i < particlesCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 15; }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const mat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff, transparent: true, opacity: 0.4 });
    const mesh = new THREE.Points(geo, mat);
    scene.add(mesh);

    function animate() {
        requestAnimationFrame(animate);
        mesh.rotation.y += 0.001;
        renderer.render(scene, camera);
    }
    animate();
}
window.addEventListener('load', initHeaderArt);

// --- YouTube API (保留功能) ---
let player;
function onYouTubeIframeAPIReady(){
    player=new YT.Player('youtubePlayer',{
        videoId:'c2ctgbsYoWE',
        playerVars:{'autoplay': 0, 'rel': 0, 'modestbranding': 1},
        events:{'onReady': setupVideoMenu}
    });
}
function setupVideoMenu(){
    document.querySelectorAll(".video-item").forEach((item,index)=> {
        item.addEventListener("click",() => {
            const videoId = item.dataset.id;
            player.loadVideoById(videoId);
            document.querySelectorAll(".video-item").forEach(v=>v.classList.remove("active"));
            item.classList.add("active");
        });
    });
}
const tag=document.createElement('script');
tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
</script>

</body>
</html>
